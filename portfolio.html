<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Music Portfolio - Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/portfolio.css">
</head>
<body data-page="portfolio">

<div class="layout">
  <div id="sidebar-slot"></div>

  <main class="content">

    <div class="topbar">
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      <strong>Portfolio</strong>
    </div>

    <section class="section">
      <div class="section-head">
        <div>
          <h2>My Works</h2>
          <p>Collection of music, projects, and performances</p>
        </div>
      </div>

      <div class="cards">

        <!-- CARD 1 -->
        <div class="card">
          <img src="https://images.unsplash.com/photo-1511379938547-c1f69419868d" alt="">
          <div class="card-body">
            <span class="tag">Music</span>
            <h3>Track One</h3>
            <p>Emotional ambient music piece.</p>
          </div>
        </div>

        <!-- CARD 2 -->
        <div class="card">
          <img src="https://images.unsplash.com/photo-1507838153414-b4b713384a76" alt="">
          <div class="card-body">
            <span class="tag">Live</span>
            <h3>Live Performance</h3>
            <p>Performed at music festival.</p>
          </div>
        </div>

        <!-- CARD 3 -->
        <div class="card">
          <img src="https://images.unsplash.com/photo-1516280440614-37939bbacd81" alt="">
          <div class="card-body">
            <span class="tag">Studio</span>
            <h3>Studio Session</h3>
            <p>Recording and production work.</p>
          </div>
        </div>

      </div>
    </section>

  </main>
</div>

<div id="footer-slot"></div>
<div class="mobile-overlay" onclick="toggleSidebar()"></div>

<script src="js/script.js"></script>
</body>
</html>
