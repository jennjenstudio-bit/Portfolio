<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Music Portfolio - Video</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/video.css">
</head>
<body data-page="video">

<div class="layout">
  <div id="sidebar-slot"></div>

  <main class="content">

    <div class="topbar">
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      <strong>Video</strong>
    </div>

    <section class="section video-section">
      <div class="section-head">
        <div>
          <h2>Music Video</h2>
          <p>Watch latest performance or music video</p>
        </div>
      </div>

      <div class="video-wrap">

        <div class="video-frame">
          <iframe
            src="https://www.youtube.com/embed/dQw4w9WgXcQ"
            title="Music video"
            allowfullscreen>
          </iframe>
        </div>

        <div class="video-description">
          <h3>Latest Release</h3>
          <p>
            This video showcases the latest music release with a modern
            cinematic visual style and emotional storytelling.
          </p>
        </div>

      </div>

    </section>

  </main>
</div>

<div id="footer-slot"></div>
<div class="mobile-overlay" onclick="toggleSidebar()"></div>

<script src="js/script.js"></script>
</body>
</html>
